server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /photos/ {
        alias /usr/share/nginx/html/public/photos/;
        autoindex off;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /src/photos.js {
        add_header Cache-Control "no-cache";
    }
}
